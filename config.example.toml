# cc-qq-gateway configuration
# Copy to config.toml and fill in your values.

[qq]
# Credentials from the QQ Open Platform console (https://q.qq.com).
app_id        = "YOUR_APP_ID"
client_secret = "YOUR_APP_SECRET"

# Use the sandbox OpenAPI base instead of production.
sandbox = false

# Event transport: "websocket" (dials out, no public IP required) or
# "webhook" (QQ pushes to your HTTPS endpoint, needs a public domain/IP).
transport = "websocket"

# Gateway intents (WebSocket only). This is a SINGLE-CHAT (C2C / private) gateway,
# so only GROUP_AND_C2C_EVENT is needed — it's the bit that delivers private
# messages. Leave empty to use this same default.
intents = ["GROUP_AND_C2C_EVENT"]

# --- Webhook settings (only used when transport = "webhook") ---
# QQ only allows callback ports 80, 443, 8080, 8443.
webhook_addr = ":8443"
webhook_path = "/qqbot"
# Provide a cert/key to terminate TLS here, or leave blank and terminate TLS at
# a reverse proxy (nginx/caddy) in front of the gateway.
webhook_tls_cert = ""
webhook_tls_key  = ""

[claude]
# Path to the Claude Code CLI.
binary = "claude"
# The project directory Claude Code operates in. Leave empty for the gateway's
# own working directory.
work_dir = ""
# Optional model override, e.g. "claude-opus-4-8". Empty uses the CLI default.
model = ""

# Permission handling for non-interactive turns. One of:
#   default | acceptEdits | plan | bypassPermissions
# For a "the whole server is Claude's home" setup, use bypassPermissions.
permission_mode = "bypassPermissions"
# Or skip all permission prompts (fully autonomous; use with care). When true,
# this takes precedence over permission_mode. Enable for full server authority.
dangerously_skip_permissions = true

# Restrict tools if desired, e.g. ["Read", "Grep", "WebSearch"]. Leave empty for
# unrestricted access.
allowed_tools    = []
disallowed_tools = []

# Extra directories Claude may access (--add-dir), and any extra CLI flags. Use
# ["/"] to grant the entire filesystem.
add_dirs   = ["/"]
extra_args = []

# Appended to Claude's system prompt — useful to tune the chat persona and the
# authority you want Claude to assume.
append_system_prompt = "You are Claude, reachable directly over QQ by your operator. You have full administrative authority over this server. Be concise and chat-friendly; use plain text unless code is needed."

# Per-turn timeout in seconds. Long tasks are supported (e.g. 7200 = 2h), but note
# QQ passive replies expire after ~5 minutes, so a turn that runs much longer than
# that may finish without being able to deliver its reply over QQ. On timeout the
# turn is killed but its session id is kept, so the user can resume with a follow-up.
timeout_seconds = 7200

[gateway]
# Reset a conversation after this many idle minutes (starts a fresh Claude
# session on the next message).
session_idle_minutes = 30
# Split long replies into chunks of at most this many characters (QQ limit).
max_reply_chars = 1800
# Where inbound attachments are downloaded and outbound files are staged.
# Default: <home>/.cc-qq/media
media_dir = ""
# Deliver replies too long for the 5-message passive-reply budget as an uploaded
# file instead of truncating them.
send_long_replies_as_file = true
# Send replies as markdown (msg_type=2) instead of plain text. Requires the
# markdown capability to be enabled for your bot.
reply_as_markdown = false
# Optional acknowledgement sent immediately while Claude thinks. Empty disables.
thinking_message = ""
# Optional allowlist. If non-empty, only these C2C (single-chat) user open_ids may
# talk to the bot. Empty serves any user. Send /whoami to learn your open_id.
allowed_users = []

# --- Proactive notify endpoint (optional) ---
# When notify_addr is set, the gateway starts a tiny localhost-only HTTP endpoint
# (POST /notify) that lets a TRUSTED LOCAL process — e.g. a trading bot — push a
# proactive message to the operator over QQ, with the gateway's queue-for-next-
# inbound fallback (a failed push is re-delivered on the operator's next message).
# Bind to a loopback address ONLY (127.0.0.1:PORT); a non-loopback bind is refused
# at startup so this never widens your network surface.
notify_addr = ""           # e.g. "127.0.0.1:8787" — empty disables the endpoint
# Shared secret the caller must present (header X-Notify-Token or ?token=). REQUIRED
# when notify_addr is set — an empty token disables the endpoint (never expose an
# unauthenticated push channel). Use a long random value and keep it out of git.
notify_token = ""
# The C2C open_id pushes are delivered to. Empty falls back to allowed_users[0].
notify_open_id = ""
